function gD(id){for(var i=0;i<DRIVERS.length;i++){if(DRIVERS[i].id===id)return DRIVERS[i];}return null;}

function getFam(){
  var seen={};var max={};
  for(var i=0;i<TRIPS.length;i++){
    var t=TRIPS[i];
    if(!seen[t.driverId])seen[t.driverId]=t;
    if(!max[t.driverId]||t.yourRating>max[t.driverId])max[t.driverId]=t.yourRating;
  }
  var result=[];
  var keys=Object.keys(seen);
  for(var i=0;i<keys.length;i++){
    var id=parseInt(keys[i]);
    var d=gD(id);
    if(!d)continue;
    var tc=0;var lt=null;
    for(var j=0;j<TRIPS.length;j++){
      if(TRIPS[j].driverId===id){tc++;if(!lt||TRIPS[j].id>lt.id)lt=TRIPS[j];}
    }
    var nd={};
    for(var k in d)nd[k]=d[k];
    nd.yourRating=max[id];nd.tripCount=tc;nd.lastTrip=lt;
    result.push(nd);
  }
  result.sort(function(a,b){return b.yourRating-a.yourRating||b.rating-a.rating;});
  return result;
}

  home:sHome,search:sSearch,ride_options:sRideOptions,wizard_driver:sWizardDriver,confirm_ride:sConfirmRide,
  tracking:sTracking,rating:sRating,history:sHistory,familiar_list:sFamiliarList,
  replay_list:sReplayList,replay_form:sReplayForm,family:sFamily,member_form:sMemberForm,appt_form:sApptForm
};
var TAB_MAP={
  home:'home',search:'home',ride_options:'home',confirm_ride:'home',tracking:'home',rating:'home',
  history:'history',familiar_list:'familiar_list',replay_list:'replay_list',replay_form:'replay_list',
  family:'family',member_form:'family',appt_form:'family'
};

function go(s){
  SCREEN=s;
  var el=document.getElementById('screen');
  el.innerHTML='<div class="sc" style="color:#fff;">'+(SCREENS[s]?SCREENS[s]():'')+'</div>';
  el.scrollTop=0;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.s===(TAB_MAP[s]||'home'));});
}

// ── Single delegated click handler ────────────────────
document.getElementById('screen').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el!==this){
    if(el.dataset&&el.dataset.action)break;
    el=el.parentElement;
  }
  if(!el||!el.dataset||!el.dataset.action)return;
  var act=el.dataset.action;
  var val=el.dataset.val;
  var idx=el.dataset.idx;
  var type=el.dataset.type;
  var id=el.dataset.id?parseInt(el.dataset.id):null;
  var pref=el.dataset.pref;

  if(act==='go'){go(val);}
  else if(act==='startRide'){ST.searchFrom=val;go('search');}
  else if(act==='selectDest'){ST.searchTo=TRIPS[parseInt(idx)].to;go('ride_options');}
  else if(act==='selectPlace'){ST.searchTo=PLACES[parseInt(idx)];go('ride_options');}
  else if(act==='selectRide'){ST.selectedType=val;go('ride_options');}
  else if(act==='toggleMoreRides'){ST.showMoreRides=!ST.showMoreRides;go('ride_options');}
  else if(act==='rebookTrip'){
    var tid=parseInt(val);
    for(var i=0;i<TRIPS.length;i++){if(TRIPS[i].id===tid){ST.searchFrom=TRIPS[i].from;ST.searchTo=TRIPS[i].to;go('ride_options');break;}}
  }
  else if(act==='rebookDriver'){ST.trackingDriverId=parseInt(val);ST.pendingRating=parseInt(val);go('tracking');}
  else if(act==='requestDriver'){ST.trackingDriverId=parseInt(val);ST.pendingRating=parseInt(val);go('tracking');}
  else if(act==='requestDriverConfirm'){ST.trackingDriverId=parseInt(val);ST.pendingRating=parseInt(val);go('tracking');}
  else if(act==='replayBook'){var rp=ST.replays[0];if(rp&&rp.driverId)ST.trackingDriverId=rp.driverId;go('tracking');}
  else if(act==='bookReplayById'){
    var rid=parseInt(val);
    for(var i=0;i<ST.replays.length;i++){if(ST.replays[i].id===rid){var rp2=ST.replays[i];if(rp2.driverId)ST.trackingDriverId=rp2.driverId;break;}}
    go('tracking');
  }
  else if(act==='bookApptById'){
    var aid=parseInt(val);
    for(var i=0;i<ST.appointments.length;i++){if(ST.appointments[i].id===aid){var ap2=ST.appointments[i];if(ap2.driverId)ST.trackingDriverId=ap2.driverId;break;}}
    go('tracking');
  }
  else if(act==='endRide'){ST.pendingRating=ST.trackingDriverId||DRIVERS[0].id;ST.ratingGiven=0;go('rating');}
  else if(act==='rate'){
    ST.ratingGiven=parseInt(val);
    for(var i=1;i<=5;i++){var s=document.getElementById('star-'+i);if(s)s.style.color=i<=ST.ratingGiven?'#FFB800':'#222';}
    var lb=document.getElementById('rlabel');if(lb)lb.textContent=['','Terrible','Bad','OK','Good','Excellent!'][ST.ratingGiven]||'';
    var sbtn=document.getElementById('submit-btn');
    if(sbtn){sbtn.textContent='Submit Rating ✓';sbtn.style.background='#00C853';sbtn.style.color='#000';}
  }
  else if(act==='submitRating'){
    if(ST.pendingRating&&ST.ratingGiven){var d=gD(ST.pendingRating);if(d)d.yourRating=ST.ratingGiven;}
    ST.pendingRating=null;ST.ratingGiven=0;go('home');
  }
  else if(act==='chip'){
    var on=el.dataset.on==='1';el.dataset.on=on?'0':'1';
    el.style.background=!on?'#0a1c0d':'';el.style.borderColor=!on?G:'#222';el.style.color=!on?G:'#555';
  }
  else if(act==='verify'){
    ST.plateVerified=!ST.plateVerified;
    var btn=document.getElementById('vbtn'),txt=document.getElementById('vtxt');
    if(btn&&txt){btn.style.background=ST.plateVerified?'#1a3320':'#2a0d0d';txt.textContent=ST.plateVerified?'Verified ✓':'Verify';txt.style.color=ST.plateVerified?G:'#e05050';}
  }
  else if(act==='quiet'){
    ST.quietOn=!ST.quietOn;var qb=document.getElementById('qbtn');if(qb)qb.textContent='🔇 Quiet: '+(ST.quietOn?'ON':'OFF');
  }
  else if(act==='sos'){
    var sb=document.getElementById('sosbtn');if(sb){sb.textContent='SENT ✓';setTimeout(function(){if(sb)sb.textContent='SOS';},2500);}
  }
  else if(act==='tog'||act==='pref'||(el.classList&&el.classList.contains('tog'))){
    if(pref){ST.formPrefs[pref]=!ST.formPrefs[pref];var ps=document.getElementById('pref-section');if(ps)ps.innerHTML=SCREEN==='replay_form'?rPrefs():SCREEN==='appt_form'?aPrefs():rPrefs();}
  }
  else if(act==='setConf'){ST.confirmDelete={type:type,id:parseInt(val)};go(SCREEN);}
  else if(act==='cancelDel'){ST.confirmDelete=null;go(SCREEN);}
  else if(act==='del'){
    var dtype=type;var did=id;
    if(dtype==='replay'){for(var i=0;i<ST.replays.length;i++){if(ST.replays[i].id===did){ST.replays.splice(i,1);break;}}}
    else if(dtype==='member'){
      for(var i=0;i<ST.members.length;i++){if(ST.members[i].id===did){ST.members.splice(i,1);break;}}
      ST.appointments=ST.appointments.filter(function(a){return a.memberId!==did;});
    }
    else if(dtype==='appt'){for(var i=0;i<ST.appointments.length;i++){if(ST.appointments[i].id===did){ST.appointments.splice(i,1);break;}}}
    ST.confirmDelete=null;
    go(dtype==='member'||dtype==='appt'?'family':'replay_list');
  }
  else if(act==='startAddReplay'){ST.editingId=null;ST.formPrefs={frontSeat:false,quiet:false,noRush:false,assisted:false,acOn:false,musicOff:false,childSeat:false};go('replay_form');}
  else if(act==='editReplay'){
    ST.editingId=parseInt(val);
    for(var i=0;i<ST.replays.length;i++){if(ST.replays[i].id===ST.editingId){var rp=ST.replays[i];ST.formPrefs=Object.assign({},rp.prefs);break;}}
    go('replay_form');
  }
  else if(act==='saveReplay'){
    var n=(document.getElementById('f-name')||{}).value;if(!n||!n.trim())return;
    var rd={name:n.trim(),from:(document.getElementById('f-from').value||'').trim(),to:(document.getElementById('f-to').value||'').trim(),
      schedule:(document.getElementById('f-schedule').value||'').trim(),prefs:Object.assign({},ST.formPrefs),
      driverId:parseInt(document.getElementById('f-driver').value)||null,
      vehicle:document.getElementById('f-vehicle').value,payment:document.getElementById('f-payment').value,
      notes:(document.getElementById('f-notes').value||'').trim()};
    if(ST.editingId){for(var i=0;i<ST.replays.length;i++){if(ST.replays[i].id===ST.editingId){Object.assign(ST.replays[i],rd);break;}}}
    else ST.replays.push(Object.assign({id:Date.now()},rd));
    ST.editingId=null;go('replay_list');
  }
  else if(act==='startAddMember'){ST.editingId=null;ST.formPrefs={smsOnly:false};go('member_form');}
  else if(act==='editMember'){ST.editingId=parseInt(val);for(var i=0;i<ST.members.length;i++){if(ST.members[i].id===ST.editingId){ST.formPrefs={smsOnly:ST.members[i].smsOnly||false};break;}}go('member_form');}
  else if(act==='saveMember'){
    var n=(document.getElementById('m-name')||{}).value;if(!n||!n.trim())return;
    var md={name:n.trim(),relation:document.getElementById('m-rel').value,age:parseInt(document.getElementById('m-age').value)||null,
      phone:(document.getElementById('m-phone').value||'').trim(),address:(document.getElementById('m-addr').value||'').trim(),smsOnly:ST.formPrefs.smsOnly};
    if(ST.editingId){for(var i=0;i<ST.members.length;i++){if(ST.members[i].id===ST.editingId){Object.assign(ST.members[i],md);break;}}}
    else ST.members.push(Object.assign({id:Date.now()},md));
    ST.editingId=null;go('family');
  }
  else if(act==='startAddAppt'){ST.editingId=null;ST.formMemberId=parseInt(val);ST.formPrefs={senior:true,smsAlert:true,autoNotify:true};go('appt_form');}
  else if(act==='editAppt'){
    ST.editingId=parseInt(val);
    for(var i=0;i<ST.appointments.length;i++){if(ST.appointments[i].id===ST.editingId){var ap=ST.appointments[i];ST.formPrefs={senior:ap.senior,smsAlert:ap.smsAlert,autoNotify:ap.autoNotify};ST.formMemberId=ap.memberId;break;}}
    go('appt_form');
  }
  else if(act==='saveAppt'){
    var t=(document.getElementById('a-title')||{}).value;if(!t||!t.trim())return;
    var ad={memberId:ST.formMemberId,title:t.trim(),type:document.getElementById('a-type').value,
      date:(document.getElementById('a-date').value||'').trim(),time:(document.getElementById('a-time').value||'').trim(),
      from:(document.getElementById('a-from').value||'').trim(),to:(document.getElementById('a-to').value||'').trim(),
      driverId:parseInt(document.getElementById('a-driver').value)||null,
      senior:ST.formPrefs.senior,smsAlert:ST.formPrefs.smsAlert,autoNotify:ST.formPrefs.autoNotify};
    if(ST.editingId){for(var i=0;i<ST.appointments.length;i++){if(ST.appointments[i].id===ST.editingId){Object.assign(ST.appointments[i],ad);break;}}}
    else ST.appointments.push(Object.assign({id:Date.now()},ad));
    ST.editingId=null;go('family');
  }
});

// Handle tog clicks (pref toggles)
document.getElementById('screen').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el!==this){
    if(el.classList&&el.classList.contains('tog'))break;
    el=el.parentElement;
  }
  if(!el||!el.classList||!el.classList.contains('tog'))return;
  var pref=el.dataset.pref;
  if(!pref)return;
  ST.formPrefs[pref]=!ST.formPrefs[pref];
  var ps=document.getElementById('pref-section');
  if(ps)ps.innerHTML=SCREEN==='replay_form'?rPrefs():aPrefs();
},true);

// Search input handler
document.getElementById('screen').addEventListener('input',function(e){
  if(e.target&&e.target.id==='st'){
    var v=e.target.value;
    var sugg=document.getElementById('sugg');
    if(!sugg||!v)return;
    var matches=[];
    for(var i=0;i<PLACES.length;i++){if(PLACES[i].toLowerCase().indexOf(v.toLowerCase())>=0)matches.push(i);}
    if(!matches.length)return;
    var h='<div style="font-size:10px;color:#444;font-weight:700;letter-spacing:.8px;margin-bottom:9px;">RESULTS</div>';
    for(var i=0;i<Math.min(6,matches.length);i++){
      var pi=matches[i];
      h+='<div class="btn" data-action="selectPlace" data-idx="'+pi+'" style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid #111;cursor:pointer;">'
        +'<div style="width:34px;height:34px;background:#141414;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">📍</div>'
        +'<div><div style="font-size:13px;font-weight:600;color:#fff;">'+esc(PLACES[pi])+'</div><div style="font-size:11px;color:#444;">Champaign, IL</div></div></div>';
    }
    sugg.innerHTML=h;
  }
});

// Init tabs
[['home','Home'],['history','Trips'],['replay_list','Replay'],['familiar_list','Drivers'],['family','Family']].forEach(function(x){
  var b=document.createElement('button');b.className='tab'+(x[0]==='home'?' on':'');
  b.dataset.s=x[0];b.textContent=x[1];
  b.onclick=function(){go(x[0]);};
  document.getElementById('tabs').appendChild(b);
});

go('home');
</script>
